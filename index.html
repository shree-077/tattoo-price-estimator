
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dayara Tattoo Estimator</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#C89B2A;--bg:#fff;--text:#222;--muted:#666;}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,sans-serif;background:#fff;color:var(--text);}
.wrap{max-width:820px;margin:auto;padding:60px 22px}
h1{font-family:Caveat,cursive;font-size:72px;line-height:.9;margin:0;color:#111;animation:slide .8s ease}
.sub{color:#666;font-size:18px;margin:10px 0 40px;animation:fade .8s ease}
.card{background:#fff;border:1px solid #eee;border-radius:28px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.08);animation:up .7s ease}
label{font-weight:700;display:block;margin:18px 0 10px}
.val{float:right;color:var(--gold);font-weight:800}
input[type=range]{width:100%;accent-color:var(--gold)}
.quote{text-align:center;padding:35px 0}
.small{color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-size:12px}
.price{font-size:64px;font-weight:800;color:var(--gold);transition:.25s}
.price.bump{transform:scale(1.08)}
.ref{font-size:22px;margin:14px 0}
.offerbox{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:20px 0}
.offer{padding:12px;border:1px solid #ddd;border-radius:16px;text-align:center;cursor:pointer;transition:.25s}
.offer:hover{transform:translateY(-2px)}
.offer.active{border-color:var(--gold);background:#fcf7e8}
.consult{display:none;font-size:20px;font-weight:600}
.btn{display:block;margin-top:24px;text-decoration:none;background:var(--gold);color:#111;padding:18px;border-radius:18px;text-align:center;font-weight:800;transition:.25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(200,155,42,.35)}
.fade{animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slide{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes up{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
<h1>How big are we talking?</h1>
<p class="sub">Move the sliders. We'll estimate the cost. Pieces over <b>40 sq in</b> are quoted after a consultation.</p>

<div class="card">
<label>Width <span id="wv" class="val">4"</span></label>
<input id="w" type="range" min="1" max="20" step="0.5" value="4">
<label>Height <span id="hv" class="val">3"</span></label>
<input id="h" type="range" min="1" max="20" step="0.5" value="3">

<div class="ref" id="ref"></div>

<div class="offerbox" id="offers"></div>

<div id="normal" class="quote">
<div class="small">Estimated Price</div>
<div id="price" class="price">₹0</div>
<div id="save"></div>
</div>

<div id="consult" class="consult">
That's a large tattoo.<br>Let's design it together and give you a custom quote. <br>Dont Worry, Its Ususally Cheaper Than ₹1000/- per sq.in.
</div>

<a id="wa" class="btn" target="_blank">Book on WhatsApp</a>
</div>
</div>

<script>
const refs=[[1,"About a ₹10 coin"],[6,"About a debit card"],[12,"About a smartphone"],[20,"About your palm"],[40,"About an A4 sheet"]];
const offers=[["No Offer",0],["Birthday",50],["Anniversary",40],["Birthday Week",30],["Birthday Month",20],["Couple",20],["First 10 Days",10]];
let discount=0,offerName="No Offer";
const oc=document.getElementById('offers');
offers.forEach((o,i)=>{
 let d=document.createElement('div');
 d.className='offer'+(i==0?' active':'');
 d.innerHTML='<b>'+o[0]+'</b>'+(o[1]?'<br>'+o[1]+'% OFF':'');
 d.onclick=()=>{document.querySelectorAll('.offer').forEach(x=>x.classList.remove('active'));d.classList.add('active');discount=o[1];offerName=o[0];update();}
 oc.appendChild(d);
});
function fmt(n){return "₹"+Math.round(n).toLocaleString("en-IN")}
function animate(target){
 let el=price;
 el.classList.add('bump');
 setTimeout(()=>el.classList.remove('bump'),250);
 let start=parseFloat(el.dataset.v||0);
 clearInterval(el.i);
 el.i=setInterval(()=>{
   start+=(target-start)*0.18;
   if(Math.abs(target-start)<2){start=target;clearInterval(el.i);}
   el.dataset.v=start;
   el.textContent=fmt(start);
 },16);
}
function update(){
 let W=+w.value,H=+h.value,A=W*H;
 wv.textContent=W+'"';hv.textContent=H+'"';
 let r="Large custom tattoo";
 for(const x of refs){if(A<=x[0]){r=x[1];break;}}
 ref.innerHTML="<b>"+A.toFixed(A%1?1:0)+" sq in</b><br>≈ "+r;
 if(A>40){
   normal.style.display='none';consult.style.display='block';
 }else{
   normal.style.display='block';consult.style.display='none';
   let base=1500+(Math.max(1,A)-1)*1000;
   let final=base*(1-discount/100);
   animate(final);
   save.textContent=discount?"You save "+fmt(base-final):"";
 }
 wa.href="https://wa.me/917972542394?text="+encodeURIComponent(`Hi Dayara Tattoos!

Size: ${W}" x ${H}"
Area: ${A.toFixed(1)} sq in
Offer: ${offerName}`);
}
w.oninput=update;h.oninput=update;update();
</script>
</body>
</html>
